profiles:
  default:
    # 占位符说明：
    # {at_user}: @新入群的用户
    # {location}: 地点
    # {role}: 专属职业/种族
    # {food}: 专属美食
    templates:
      - "{at_user}\n在落日余晖中，一位来自 {location} 的 {role} 走进了庇护地。\n曾经的繁荣已被荒芜掩盖，四周只留下一片平和的寂静。坐下来尝尝这 {food} ，然后在这里安心歇息吧。"
      - "{at_user}\n穿过原野与薄雾，一位来自 {location} 的 {role} 结束了漫长的跋涉，抵达这处枢纽。\n外界的世界变幻无常，但这里暂且安全。这里有一份 {food} ，吃完再做接下来的打算。"
      - "{at_user}\n夜幕降临，微光播撒在大地上。一位来自 {location} 的 {role} 寻着安静的灯火，踏入了庇护地。\n枢纽通道的旅途消耗极大。门外留有风霜，但这里为你准备了 {food} ，用来补充体力正好。"
      - "{at_user}\n大门被推开，一位来自 {location} 的 {role} 掸去身上的落叶与灰尘，走进了庇护地。\n乱世中的旅者总需要一个落脚点。来一份 {food} ，趁热吃下，能有效地驱散疲劳。"
