<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=800" />
    <link rel="stylesheet" href="{{cssFileUrl}}" />
  </head>
  <body>
    <div id="container"{{if backgroundImageUrl}} style="--custom-bg-image: url('{{backgroundImageUrl}}');"{{/if}}>
      <!-- 魔法暗角与光晕叠加，保证文字不管背景如何都能清晰 -->
      <div class="vignette-overlay"></div>
      
      <!-- 星光特效装饰 -->
      <div class="stardust dust-1"></div>
      <div class="stardust dust-2"></div>
      <div class="stardust dust-3"></div>

      <!-- 奇幻冒险者卡片主体 -->
      <div class="card">
        
        <!-- 顶部装饰纹理 -->
        <div class="card-ornament top-ornament">
          <div class="ornament-line"></div>
          <div class="ornament-diamond">✦</div>
          <div class="ornament-line"></div>
        </div>

        <div class="content-wrapper">
          <!-- 头部信息 -->
          <div class="header">
            <div class="avatar-wrapper">
              <div class="avatar-glow"></div>
              <div class="avatar-border">
                <img class="avatar" src="{{avatarUrl}}" alt="avatar" />
              </div>
              <div class="welcome-badge">{{if groupTitle}}{{groupTitle}}{{else}}LV.NEW{{/if}}</div>
            </div>
            
            <div class="user-info">
              <div class="title-row">
                <h1 class="nickname">{{nickname}}</h1>
                <span class="uid-tag">UID: {{userId}}</span>
              </div>
              <div class="guild-info">
                <span class="guild-icon">❈</span>
                <span class="guild-text">欢迎来到 <span class="group-name">「{{groupName}}」</span></span>
                <span class="guild-dot">·</span>
                <span class="member-count">凯德拉尔的第 {{memberCount}} 位旅者</span>
              </div>
            </div>
          </div>

          <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-icon">✧</div>
            <div class="divider-line"></div>
          </div>

          <!-- 奇幻背景故事/文案 -->
          <div class="story-box">
            <div class="story-quote left">❝</div>
            <p class="story-text">{{storyText}}</p>
            <div class="story-quote right">❞</div>
          </div>


        </div>
        
        <!-- 底部装饰纹理 -->
        <div class="card-ornament bottom-ornament">
          <div class="ornament-line"></div>
          <div class="ornament-diamond">✦</div>
          <div class="ornament-line"></div>
        </div>

      </div>
      
      <div class="watermark">DIARY OF OLD OBSERVATION</div>
    </div>
  </body>
</html>
